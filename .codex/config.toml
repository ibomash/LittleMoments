# Project-scoped Codex configuration for Xcode/iOS agent work.
# Codex Desktop/CLI may still require a restart or a matching global entry in
# ~/.codex/config.toml before newly added MCP servers are available.

[mcp_servers.XcodeBuildMCP]
command = "npx"
args = ["-y", "xcodebuildmcp@latest", "mcp"]
cwd = "/Users/ibomash/Local/LittleMoments"
enabled = true
startup_timeout_sec = 120
tool_timeout_sec = 600

[mcp_servers.XcodeBuildMCP.env]
XCODEBUILDMCP_ENABLED_WORKFLOWS = "simulator,project-discovery,debugging,ui-automation,coverage,xcode-ide"
XCODEBUILDMCP_MCP_IDLE_TIMEOUT_MS = "600000"
XCODEBUILDMCP_SENTRY_DISABLED = "true"
