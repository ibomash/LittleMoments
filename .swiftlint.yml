# .swiftlint.yml
excluded:
  - Carthage
  - Pods
  - DerivedData

# Let swift-format own layout
disabled_rules:
  - opening_brace
  - closing_brace
  - colon
  - comma
  # Prefer swift-format defaults for comma placement and closure formatting.
  - trailing_comma
  - multiple_closures_with_trailing_closure
  - trailing_whitespace
  - vertical_whitespace_between_cases
  # Keep lint focused on correctness/safety; size/complexity is handled via review.
  - file_length
  - type_body_length
  - cyclomatic_complexity
  - large_tuple
  - implicit_optional_initialization
  - identifier_name

# Keep these, but align with formatter settings
line_length:
  warning: 200
  error: 240
  ignores_urls: true
  ignores_comments: true
  ignores_interpolated_strings: true

vertical_whitespace:
  max_empty_lines: 1

# If you want import checks, keep this ON (matches OrderedImports)
opt_in_rules:
  - sorted_imports
